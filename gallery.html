  <!-- JavaScript -->
  <script type="module">
    import { GalleryPage } from '/src/modules/gallery.js';
    
    // Initialize gallery page when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        // Fetch gallery data
        const response = await fetch('/assets/images/gallery-data.json');
        const data = await response.json();
        
        // Initialize gallery page with images only (no video)
        const galleryGrid = document.getElementById('gallery-page-grid');
        if (galleryGrid && data.images) {
          new GalleryPage(galleryGrid, data.images);
        }
      } catch (error) {
        console.error('Failed to load gallery:', error);
      }
    });
  </script>
